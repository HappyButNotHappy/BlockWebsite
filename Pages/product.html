	function getParam(key){ return new URLSearchParams(window.location.search).get(key); }

	function changeImage(e, src){
		document.getElementById('mainImage').src = src;
		document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
		if (e && e.target) e.target.classList.add('active');
	}

	function clampQuantity(input){
		let v = parseInt(input.value,10) || 1;
		v = Math.min(5, Math.max(1, v));
		input.value = v; return v;
	}

	function addToCart(productId, quantity){
		const prod = products[productId]; if(!prod) return;
		const cart = getCart();
		const existing = cart.find(i=>i.id===productId);
		if(existing) existing.quantity = Math.min(5, existing.quantity + quantity);
		else cart.push({ id: productId, title: prod.title, sku: prod.sku, price: parsePrice(prod.price), image: prod.images[0]||'', quantity });
		saveCart(cart); updateCartCount(); alert('Added to cart: '+prod.title+' (Qty: '+quantity+')');
	}

	function renderProduct(id){
		const p = products[id]; if(!p) return;
		document.getElementById('productTitle').textContent = p.title;
		document.getElementById('productSKU').textContent = 'SKU: '+p.sku;
		document.getElementById('productPrice').textContent = p.price;
		document.getElementById('productOldPrice').querySelector('s').textContent = p.oldPrice || '';
		document.getElementById('productDescription').textContent = p.description;
		document.getElementById('productRating').textContent = p.rating;
		const feats = document.getElementById('productFeatures'); feats.innerHTML = '';
		(p.features||[]).forEach(f=>{ const li=document.createElement('li'); li.textContent=f; feats.appendChild(li); });
		const main = document.getElementById('mainImage'); const thumbs = document.getElementById('thumbs'); thumbs.innerHTML='';
		if(p.images && p.images.length){ main.src = p.images[0]; p.images.forEach((s,i)=>{ const img=document.createElement('img'); img.src=s; img.className='thumbnail rounded'+(i===0?' active':''); img.alt='thumb'+(i+1); img.onclick=(e)=>changeImage(e,s); thumbs.appendChild(img); }); }
	}

	document.addEventListener('DOMContentLoaded', ()=>{
		const id = getParam('id') || Object.keys(products)[0];
		renderProduct(id);
		const qty = document.getElementById('quantity'); qty.addEventListener('input', ()=>clampQuantity(qty));
		document.getElementById('addToCart').addEventListener('click', ()=>addToCart(id, clampQuantity(qty)));
	});
